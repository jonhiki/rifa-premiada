<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa Premiada</title>
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            padding: 0 0 30px 0;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative;
            padding-bottom: 60px;
        }

        .banner-topo {
            width: 100%;
            display: block;
            max-height: 280px;
            object-fit: cover;
        }

        .conteudo {
            padding: 15px;
        }

        .faixa-preco {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
            padding: 12px;
            margin-top: -25px;
            position: relative;
            z-index: 10;
            font-size: 15px;
            color: #2d3748;
        }

        .faixa-preco strong {
            color: #1a202c;
            font-size: 17px;
        }

        .titulo-rifa {
            font-size: 26px;
            color: #0f172a;
            font-weight: 700;
            margin: 20px 0 15px 0;
        }

        .perfil-organizador {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #e2e8f0;
            object-fit: cover;
        }

        .info-org p {
            font-size: 11px;
            color: #718096;
        }

        .info-org h4 {
            font-size: 16px;
            color: #1a202c;
            margin-bottom: 2px;
        }

        .caixa-branca-seletor {
            border: 1px solid #edf2f7;
            border-radius: 12px;
            padding: 20px 15px;
            background: #ffffff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            margin-bottom: 20px;
        }

        .titulo-secao {
            text-align: center;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #718096;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .grid-botoes {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .btn-cota {
            background: #fff;
            border: 1px solid #e2e8f0;
            padding: 12px 5px;
            border-radius: 8px;
            font-weight: bold;
            color: #2d3748;
            cursor: pointer;
            font-size: 14px;
        }

        .contador-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 20px;
        }

        .btn-passo {
            background: #f7fafc;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 6px;
            font-size: 20px;
            cursor: pointer;
            color: #4a5568;
        }

        #input-qtd {
            border: none;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            width: 70%;
            outline: none;
        }

        .resumo-valor {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 15px;
            color: #4a5568;
        }

        #valor-final {
            font-size: 18px;
            font-weight: bold;
            color: #1a202c;
        }

        #wallet_container {
            width: 100%;
            min-height: 48px;
        }

        .grid-infos {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 10px;
        }

        .card-info {
            background: white;
            border: 1px solid #edf2f7;
            border-radius: 12px;
            padding: 15px;
        }

        .card-info h5 {
            font-size: 11px;
            color: #718096;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .card-info .detalhe {
            font-size: 13px;
            font-weight: bold;
            color: #2d3748;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .rodape-creditos {
            text-align: center;
            padding: 20px 0;
            margin-top: 30px;
            border-top: 1px solid #edf2f7;
            font-size: 12px;
            color: #a0aec0;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="file_00000000ba98720eafcbe5cf244b7d05.png" alt="Banner Rifa" class="banner-topo">

    <div class="conteudo">
        <div class="faixa-preco">
            Participe por apenas <strong>R$ 0,40</strong> 🔥
        </div>

        <h1 class="titulo-rifa">Rifa premiada</h1>

        <div class="perfil-organizador">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Avatar" class="avatar">
            <div class="info-org">
                <p>Organizado por:</p>
                <h4>Midra Chama</h4>
            </div>
        </div>

        <div class="caixa-branca-seletor">
            <div class="titulo-secao">Selecione a quantidade de cotas</div>
            
            <div class="grid-botoes">
                <button class="btn-cota" onclick="adicionarCotas(1)">+1</button>
                <button class="btn-cota" onclick="adicionarCotas(5)">+5</button>
                <button class="btn-cota" onclick="adicionarCotas(10)">+10</button>
                <button class="btn-cota" onclick="adicionarCotas(100)">+100</button>
                <button class="btn-cota" onclick="adicionarCotas(1000)">+1000</button>
                <button class="btn-cota" onclick="adicionarCotas(5000)">+5000</button>
                <button class="btn-cota" onclick="adicionarCotas(10000)">+10000</button>
                <button class="btn-cota" onclick="adicionarCotas(20000)">+20000</button>
            </div>

            <div class="contador-container">
                <button class="btn-passo" onclick="alterarPasso(-1)">-</button>
                <input type="number" id="input-qtd" value="1" min="1" oninput="calcularTotal()">
                <button class="btn-passo" onclick="alterarPasso(1)">+</button>
            </div>

            <div class="resumo-valor">
                <span>Valor final</span>
                <span id="valor-final">R$ 0,40</span>
            </div>

            <div id="wallet_container"></div>
        </div>

        <div class="grid-infos">
            <div class="card-info">
                <h5>Método de Pagamento</h5>
                <div class="detalhe">💎 PIX DIRETO</div>
            </div>
            <div class="card-info">
                <h5>Sorteio</h5>
                <div class="detalhe">🍀 LIVE NO INSTAGRAM</div>
            </div>
        </div>

        <div class="rodape-creditos">
            <p>Termos de uso | Políticas de privacidade</p>
        </div>
    </div>
</div>

<script>
    const precoPorCota = 0.40;
    const inputQtd = document.getElementById('input-qtd');
    const valorFinalTxt = document.getElementById('valor-final');

    // Inicializando com a chave pública de PRODUÇÃO válida
    const mp = new MercadoPago('APP_USR-c4c9e26d-ddec-4e66-931d-c5bb5ac6a588', {
        locale: 'pt-BR'
    });

    let bricksBuilder = mp.bricks();
    let walletBrickController = null;

    function calcularTotal() {
        let qtd = parseInt(inputQtd.value);
        if (isNaN(qtd) || qtd < 1) qtd = 1;
        let total = qtd * precoPorCota;
        valorFinalTxt.innerText = total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        
        renderizarBotaoPagamento(qtd, total);
    }

    function adicionarCotas(quantidade) {
        let atual = parseInt(inputQtd.value) || 0;
        inputQtd.value = atual + quantidade;
        calcularTotal();
    }

    function alterarPasso(valor) {
        let atual = parseInt(inputQtd.value) || 1;
        let novoValor = atual + valor;
        if (novoValor >= 1) {
            inputQtd.value = novoValor;
            calcularTotal();
        }
    }

    async function renderizarBotaoPagamento(quantidade, valorTotal) {
        if (walletBrickController) {
            walletBrickController.unmount();
        }

        bricksBuilder.create("wallet", "wallet_container", {
            initialization: {
                preferenceId: null, 
                marketplace: false
            },
            customization: {
                texts: {
                    valueProp: 'smart_option',
                    action: 'pay'
                }
            },
            callbacks: {
                onSubmit: () => {
                    return new Promise((resolve) => {
                        const dadosPreferencia = {
                            items: [{
                                title: `Reserva de ${quantidade} Cotas - Rifa Premiada`,
                                quantity: 1,
                                unit_price: Number(valorTotal.toFixed(2)),
                                currency_id: 'BRL'
                            }],
                            payment_methods: {
                                excluded_payment_types: [
                                    { id: "ticket" }, { id: "atm" }, { id: "credit_card" }, { id: "debit_card" }
                                ],
                                default_payment_method_id: "pix"
                            }
                        };
                        resolve(dadosPreferencia);
                    });
                },
                onReady: () => {
                    console.log("Botão de produção carregado!");
                },
                onError: (error) => {
                    console.error("Erro no checkout:", error);
                }
            }
        }).then((controller) => {
            walletBrickController = controller;
        });
    }

    window.onload = function() {
        calcularTotal();
    };
</script>

</body>
</html>
