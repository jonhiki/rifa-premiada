<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa Premiada</title>
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <style>
        /* [Estilos mantidos iguais aos anteriores para manter o layout] */
        body { background-color: #f4f6f9; display: flex; justify-content: center; font-family: sans-serif; }
        .container { background: #ffffff; width: 100%; max-width: 480px; min-height: 100vh; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .grid-botoes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .btn-cota { padding: 15px; border: 1px solid #ccc; border-radius: 8px; cursor: pointer; }
        .contador-container { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 20px 0; }
        #wallet_container { margin-top: 20px; min-height: 50px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Rifa premiada</h1>
    <p>Valor por cota: R$ 0,40</p>
    
    <div class="grid-botoes">
        <button class="btn-cota" onclick="adicionarCotas(1)">+1</button>
        <button class="btn-cota" onclick="adicionarCotas(5)">+5</button>
        <button class="btn-cota" onclick="adicionarCotas(10)">+10</button>
    </div>

    <div class="contador-container">
        <button onclick="alterarPasso(-1)">-</button>
        <input type="number" id="input-qtd" value="1" oninput="atualizarPagamento()">
        <button onclick="alterarPasso(1)">+</button>
    </div>

    <p>Valor final: <span id="valor-final">R$ 0,40</span></p>

    <div id="wallet_container"></div>
</div>

<script>
    const mp = new MercadoPago('APP_USR-c4c9e26d-ddec-4e66-931d-c5bb5ac6a588');
    const bricksBuilder = mp.bricks();
    let walletBrick = null;

    function atualizarPagamento() {
        const qtd = parseInt(document.getElementById('input-qtd').value) || 1;
        const total = (qtd * 0.40).toFixed(2);
        document.getElementById('valor-final').innerText = 'R$ ' + total.replace('.', ',');

        if (walletBrick) walletBrick.unmount(); // Remove o antigo antes de criar novo
        
        bricksBuilder.create("wallet", "wallet_container", {
            initialization: {
                preferenceId: null,
            },
            callbacks: {
                onSubmit: () => {
                    return new Promise((resolve) => {
                        resolve({
                            items: [{ title: 'Cotas Rifa', quantity: 1, unit_price: Number(total) }],
                            payment_methods: { default_payment_method_id: "pix" }
                        });
                    });
                }
            }
        }).then(controller => walletBrick = controller);
    }

    function adicionarCotas(n) {
        document.getElementById('input-qtd').value = parseInt(document.getElementById('input-qtd').value) + n;
        atualizarPagamento();
    }

    function alterarPasso(n) {
        let val = parseInt(document.getElementById('input-qtd').value) + n;
        if (val < 1) val = 1;
        document.getElementById('input-qtd').value = val;
        atualizarPagamento();
    }

    // Inicializa uma vez ao carregar
    atualizarPagamento();
</script>

</body>
</html>
