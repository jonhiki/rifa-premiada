<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa Premiada</title>
    <style>
        * { box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #f4f6f9; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: #fff; width: 100%; max-width: 400px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .btn-reservar { width: 100%; padding: 15px; background: #059669; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        textarea { width: 100%; height: 100px; margin-top: 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Rifa Premiada</h1>
    <p>Organizado por: <strong>Deivid Arruda Cajui</strong></p>
    
    <button class="btn-reservar" onclick="exibirPix()">GERAR PIX</button>

    <div id="areaPix" style="display:none; margin-top:20px;">
        <p>Código copiado para sua área de transferência:</p>
        <textarea id="copiaCola" readonly></textarea>
        <button class="btn-reservar" style="background: #27ae60;" onclick="copiarTexto()">COPIAR NOVAMENTE</button>
    </div>
</div>

<script>
    function exibirPix() {
        // Código PIX fixo oficial
        var codigoOficial = "00020126470014BR.GOV.BCB.PIX0125deividkratos000@gmail.com5204000053039865802BR5919DEIVID ARRUDA CAJUI6015PORTO SEGURO (T62070503***6304A3AB";
        
        var campo = document.getElementById('copiaCola');
        campo.value = codigoOficial;
        document.getElementById('areaPix').style.display = 'block';
        
        // Copia automaticamente
        campo.select();
        document.execCommand('copy');
        alert("Código PIX copiado com sucesso! Agora é só colar no seu banco.");
    }

    function copiarTexto() {
        var c = document.getElementById('copiaCola');
        c.select();
        document.execCommand('copy');
        alert("Código copiado!");
    }
</script>
</body>
</html>
